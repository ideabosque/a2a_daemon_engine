# Alembic configuration for a2a_daemon_engine PostgreSQL backend.
#
# Run migrations with:
#   alembic -c migration/alembic.ini upgrade head

[alembic]
script_location = %(here)s/alembic
# Use a project-private version table so this schema's migration history does
# not collide with other SilvaEngine projects sharing the same database.
version_table = a2a_alembic_version
sqlalchemy.url = postgresql+psycopg2://user:password@localhost:5432/a2a_daemon_engine

# Target metadata for autogenerate
# This is set programmatically in env.py

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S