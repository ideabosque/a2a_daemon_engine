[pytest]
# Pytest configuration for A2A Daemon Engine

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths (current directory since pytest.ini is in tests/)
testpaths = .

# Minimum Python version
minversion = 3.8

# Command line options
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# Markers - These are registered in conftest.py pytest_configure hook
# But we can also document them here for reference
markers =
    unit: Unit tests (no external dependencies)
    integration: Integration tests (DB, API)
    slow: Tests taking significant time
    a2a: A2A protocol tests
    agent: Agent-related tests
    task: Task handling tests
    message: Message routing tests
    setting: Setting-related tests
    server: A2A server tests
    graphql: GraphQL schema tests
    cache: Cache configuration tests

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Coverage options (if using pytest-cov)
# Uncomment to enable coverage reporting
# addopts = --cov=a2a_daemon_engine --cov-report=html --cov-report=term

# Timeout for tests (if using pytest-timeout)
# timeout = 300

# Filterwarnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
